<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBA Run</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  #header { background: #16213e; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; }
  #header h1 { font-size: 15px; color: #e94560; }
  #activity { font-size: 13px; color: #a0a0a0; flex: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 12px; }
  #cancelBtn { background: #e94560; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  #cancelBtn:hover { background: #c73652; }
  #cancelBtn:disabled { background: #555; cursor: not-allowed; }

  /* Progress bar */
  #progressBar { height: 3px; background: #0f3460; }
  #progressFill { height: 100%; background: #e94560; width: 0%; transition: width 0.3s ease; }

  /* Main layout */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 260px; background: #16213e; border-right: 1px solid #0f3460; overflow-y: auto; padding: 8px 0; }
  .sidebar-section { padding: 8px 12px; }
  .sidebar-section h2 { font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 1px; margin-bottom: 6px; }
  .phase-item, .check-item { padding: 4px 8px; font-size: 13px; border-radius: 3px; margin: 2px 0; }
  .phase-item.active, .check-item.active { background: #1e2a4a; color: #e94560; font-weight: bold; }
  .phase-item .icon, .check-item .icon { margin-right: 6px; }
  .icon-pending { color: #555; }
  .icon-running { color: #e94560; }
  .icon-done { color: #4caf50; }
  .icon-failed { color: #f44336; }
  .icon-skipped { color: #555; }

  /* Content area */
  #content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #output { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; color: #c0c0c0; }
  #output:empty::before { content: "Waiting for output..."; color: #555; }

  /* Footer */
  #footer { background: #16213e; padding: 8px 20px; border-top: 1px solid #0f3460; display: flex; justify-content: space-between; font-size: 12px; color: #a0a0a0; }
  #footer a { color: #e94560; text-decoration: none; }
  #footer a:hover { text-decoration: underline; }
  #prUrl { display: none; }

  /* Cancelled overlay */
  #cancelledOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10; justify-content: center; align-items: center; }
  #cancelledOverlay.visible { display: flex; }
  #cancelledBox { background: #16213e; padding: 24px 32px; border-radius: 8px; text-align: center; color: #e94560; font-size: 18px; }
</style>
</head>
<body>

<div id="header">
  <h1 id="title">GBA Run</h1>
  <span id="activity">Starting...</span>
  <button id="cancelBtn" onclick="cancel()">Cancel</button>
</div>

<div id="progressBar"><div id="progressFill"></div></div>

<div id="main">
  <div id="sidebar">
    <div class="sidebar-section">
      <h2>Phases</h2>
      <div id="phaseList"></div>
    </div>
    <div class="sidebar-section">
      <h2>Checks</h2>
      <div id="checkList">
        <div class="check-item" id="reviewItem"><span class="icon icon-pending">&#9675;</span> Code Review</div>
        <div class="check-item" id="verificationItem"><span class="icon icon-pending">&#9675;</span> Verification</div>
        <div class="check-item" id="prItem"><span class="icon icon-pending">&#9675;</span> PR Creation</div>
      </div>
    </div>
  </div>
  <div id="content">
    <div id="output"></div>
  </div>
</div>

<div id="footer">
  <span id="stats">Turns: 0 | Cost: $0.0000</span>
  <a id="prUrl" href="#" target="_blank">Open PR</a>
  <span id="help"></span>
</div>

<div id="cancelledOverlay"><div id="cancelledBox">Cancelling...</div></div>

<script>
// --- State ---
var ws = null;
var phases = [];
var currentPhase = -1;
var progress = 0;

// --- Init ---
(function init() {
  var proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(proto + "//" + location.host + "/ws/run");

  ws.onopen = function() {};
  ws.onclose = function() {};
  ws.onerror = function() {};

  ws.onmessage = function(evt) {
    var msg = JSON.parse(evt.data);
    switch (msg.type) {
      case "ready": setActivity("Ready"); break;
      case "phasesList":
        for (var i = 0; i < msg.names.length; i++) {
          phases.push({ name: msg.names[i], status: "pending" });
        }
        renderPhases();
        break;
      case "text": appendOutput(msg.content); break;
      case "phaseStarted":
        currentPhase = msg.index;
        if (!phases[msg.index]) {
          phases[msg.index] = { name: msg.name, status: "running" };
        } else {
          phases[msg.index].status = "running";
        }
        clearOutput();
        renderPhases();
        setActivity("Executing: " + msg.name);
        break;
      case "phaseCompleted":
        if (phases[msg.index]) phases[msg.index].status = "done";
        renderPhases();
        setActivity("Phase " + (msg.index + 1) + " completed");
        updateProgress();
        break;
      case "phaseFailed":
        if (phases[msg.index]) phases[msg.index].status = "failed";
        renderPhases();
        setActivity("Phase " + (msg.index + 1) + " failed");
        break;
      case "statsUpdate":
        document.getElementById("stats").textContent = "Turns: " + msg.turns + " | Cost: $" + msg.costUsd.toFixed(4);
        break;
      case "activity": setActivity(msg.message); break;
      case "checkStarted":
        var itemId = msg.checkType === "review" ? "reviewItem" : "verificationItem";
        setCheckStatus(itemId, "running");
        clearOutput();
        break;
      case "checkIterationStarted": setActivity(msg.checkType + ": Checking (" + msg.iteration + "/" + msg.maxIterations + ")"); break;
      case "checkIterationResult": break;
      case "fixStarted": setActivity(msg.checkType + ": Fixing (" + msg.iteration + ")"); break;
      case "fixCompleted": break;
      case "checkCompleted":
        var checkItemId = msg.checkType === "review" ? "reviewItem" : "verificationItem";
        setCheckStatus(checkItemId, msg.result === "passed" ? "done" : "failed");
        setActivity(msg.checkType + ": " + msg.result);
        updateProgress();
        break;
      case "prCreationStarted":
        setCheckStatus("prItem", "running");
        setActivity("Creating pull request...");
        break;
      case "prCreationCompleted":
        setCheckStatus("prItem", msg.prUrl ? "done" : "skipped");
        if (msg.prUrl) {
          var el = document.getElementById("prUrl");
          el.href = msg.prUrl;
          el.style.display = "inline";
          el.textContent = "Open PR";
        }
        setActivity(msg.prUrl ? "PR created" : "PR creation completed");
        updateProgress();
        break;
      case "complete":
        setActivity("Execution complete!");
        document.getElementById("cancelBtn").disabled = true;
        updateProgress();
        break;
      case "error":
        appendOutput("Error: " + msg.message + "\n");
        setActivity("Error");
        break;
    }
  };

  // Warn on refresh
  window.addEventListener("beforeunload", function(e) {
    e.preventDefault();
    e.returnValue = "";
  });
})();

// --- Actions ---
function cancel() {
  if (ws) {
    ws.send(JSON.stringify({ type: "cancel" }));
    ws.close();
  }
  document.getElementById("cancelledOverlay").classList.add("visible");
}

// --- DOM helpers ---
function setActivity(text) {
  document.getElementById("activity").textContent = text;
}

function appendOutput(text) {
  var el = document.getElementById("output");
  el.textContent += text;
  el.scrollTop = el.scrollHeight;
}

function clearOutput() {
  document.getElementById("output").textContent = "";
}

function updateProgress() {
  // Simple progress: phases complete * 60%, + review(15%) + verify(15%) + pr(10%)
  var completed = phases.filter(function(p) { return p.status === "done"; }).length;
  var total = phases.length || 1;
  var pct = Math.round((completed / total) * 60);

  var reviewEl = document.getElementById("reviewItem");
  var verifyEl = document.getElementById("verificationItem");
  var prEl = document.getElementById("prItem");

  if (reviewEl.dataset.status === "done") pct += 15;
  if (verifyEl.dataset.status === "done") pct += 15;
  if (prEl.dataset.status === "done") pct += 10;

  document.getElementById("progressFill").style.width = pct + "%";
}

function renderPhases() {
  var html = "";
  for (var i = 0; i < phases.length; i++) {
    var p = phases[i];
    var isActive = i === currentPhase;
    var iconClass = "icon-pending";
    var icon = "&#9675;";
    if (p.status === "running") { iconClass = "icon-running"; icon = "&#9698;"; }
    else if (p.status === "done") { iconClass = "icon-done"; icon = "&#9679;"; }
    else if (p.status === "failed") { iconClass = "icon-failed"; icon = "&#10007;"; }
    var cls = isActive ? "phase-item active" : "phase-item";
    html += '<div class="' + cls + '"><span class="icon ' + iconClass + '">' + icon + '</span>' + (i + 1) + '. ' + p.name + '</div>';
  }
  document.getElementById("phaseList").innerHTML = html;
}

function setCheckStatus(itemId, status) {
  var el = document.getElementById(itemId);
  el.dataset.status = status;
  var icon = el.querySelector(".icon");
  icon.className = "icon";
  if (status === "running") { icon.className += " icon-running"; icon.innerHTML = "&#9698;"; el.className = "check-item active"; }
  else if (status === "done") { icon.className += " icon-done"; icon.innerHTML = "&#9679;"; el.className = "check-item"; }
  else if (status === "failed") { icon.className += " icon-failed"; icon.innerHTML = "&#10007;"; el.className = "check-item"; }
  else if (status === "skipped") { icon.className += " icon-skipped"; icon.innerHTML = "&#9675;"; el.className = "check-item"; }
}
</script>
</body>
</html>
