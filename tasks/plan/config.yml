# GBA Plan Task Configuration
# Plan mode allows reading, creating, and editing spec files
preset: true
tools:
  - Read
  - Glob
  - Grep
  - Write             # For creating spec files (design.md, verification.md)
  - Edit              # For editing spec files after user feedback
  - WebFetch
  - WebSearch
disallowedTools:
  - Bash              # No shell commands
